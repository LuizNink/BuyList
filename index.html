<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyList</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--CABEÇALHO-->
    <header>
        <h1>BuyList</h1>
        <h1>Total: 0</h1>
    </header>

    <!--INPUTs E BOTAO-->
    <main>
        <div class="secao-1">
            <input type="text" class="input input-nome" placeholder="Nome" name="nome" autocomplete="off">
            <input type="number" class="input input-number" placeholder="Preço" name="preco" autocomplete="off">
            <input type="number" class="input input-number" placeholder="Quantidade" name="quantidade" autocomplete="off">
            <button class="button-adicionar">Adicionar</button>
        </div>    
        <hr class="linha-inputs"> 
    </main>



    <script src="script.js"></script>
</body>
</html>
