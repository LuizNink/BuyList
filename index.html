<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyList</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <!--CABEÇALHO-->
    <header>
        <h1>BuyList</h1>
        <h1 id="total">Total: R$ 0,00</h1>
    </header>

    <!--INPUTS E BOTAO-->
    <main>
        <div class="secao-1">
            <input type="text" id="input-nome" class="input" placeholder="Nome" name="nome" autocomplete="off">
            <input type="number" id="input-preco" class="input" placeholder="Preço" name="preco" autocomplete="off">
            <input type="number" id="input-quantidade" class="input" placeholder="Quantidade" name="quantidade" autocomplete="off">
            <button id="botao-adicionar" class="botao-adicionar">Adicionar</button>
        </div>    
        <hr id="linha-inputs"> 

        <!--LISTA DE COMPRAS-->
        <h1>Lista de Compras</h1>

        <ul id="lista-de-compras">

        </ul>
    </main>

    <!--FOOTER-->
    <footer id="footer">
        a
    </footer>



    <script src="script.js"></script>
</body>
</html>
